<script>
const images = [
  "mountain.png",
  "citypic.png",
  "nicefood.pngĥ"
];

let index = 0;

function changeBackground() {
  const container = document.querySelector(".container");
  if (!container) return;

  container.style.backgroundImage =
    `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.6)), url('${images[index]}')`;

  index = (index + 1) % images.length;
}

setInterval(changeBackground, 3000);
changeBackground();
</script>
